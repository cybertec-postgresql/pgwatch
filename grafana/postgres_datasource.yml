apiVersion: 1

datasources:
- name: pgwatch metrics (postgres)
  uid: pgwatch-metrics
  type: postgres
  url: postgres:5432
  access: proxy
  user: pgwatch
  secureJsonData:
    password: pgwatchadmin
  basicAuth: false
  isDefault: true
  jsonData:
    database: pgwatch_metrics
    sslmode: disable
    postgresVersion: 1500
  version: 1
  editable: true
